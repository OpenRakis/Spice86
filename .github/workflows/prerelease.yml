name: "pre-release"

on:
  push:
    branches:
      - "master"

permissions:
  contents: read
  packages: write

jobs:
  pre-release:
    name: "Pre Release"
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v4

      - name: Determine prerelease version
        run: |
          BASE_VERSION=$(awk -F'[<>]' '/<Version>/{print $3; exit}' src/Directory.Build.props)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          echo "PRERELEASE_VERSION=${BASE_VERSION}-${COMMIT_SHA}" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test with dotnet
        working-directory: ./src
        run: dotnet test --configuration Release

      # Suppress the following warnings during NuGet packing:
      #   1591   - Missing XML documentation
      #   NU5104 - Package icon issues
      #   NU1507 - Package validation issues
      # Semicolons are URL-encoded as %3B for compatibility.
      - name: Pack prerelease NuGet packages
        working-directory: ./src
        run: dotnet pack Spice86.sln --configuration Release --include-symbols --include-source -p:PackageVersion=${PRERELEASE_VERSION} -p:SymbolPackageFormat=snupkg -p:NoWarn=1591%3BNU5104%3BNU1507

      - name: Publish prerelease NuGet packages
        env:
          PACKAGE_VERSION: ${{ env.PRERELEASE_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SOURCE="https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          for project in Spice86.Storage.Cd Spice86.Storage.Fat Spice86.Shared Spice86.Logging Spice86.Core Spice86; do
               PACKAGE_PATH="./src/${project}/bin/Release/${project}.${PACKAGE_VERSION}.nupkg"
               if [ -f "$PACKAGE_PATH" ]; then
                    dotnet nuget push "$PACKAGE_PATH" --source "$SOURCE" --api-key "$GITHUB_TOKEN" --skip-duplicate
               else
                    echo "::error::Package not found: $PACKAGE_PATH"
                    exit 1
               fi
          done
